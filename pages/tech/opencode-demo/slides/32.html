<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 32 页</title>
    <script src="../libs/tailwind.js"></script>
    <link rel="stylesheet" href="../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-users text-blue-600"></i> OpenCode 适合谁用？
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-8"></div>

            <div class="bg-white p-6 rounded-xl card-gradient-border mb-6">
                <h3 class="font-bold text-slate-800 mb-4 text-lg">最佳匹配人群</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-blue-50 p-4 rounded-xl card-gradient-border-blue text-center">
                        <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2">
                            <i class="ph ph-terminal text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-blue-900 mb-1 text-sm">命令行开发者</h4>
                        <p class="text-xs text-blue-700">喜欢 TUI、不想离开终端</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl text-center" style="border:1px solid #e0f2fe; box-shadow:0 10px 40px -10px rgba(56,189,248,0.1)">
                        <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2">
                            <i class="ph ph-lock-open text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-blue-900 mb-1 text-sm">开源拥护者</h4>
                        <p class="text-xs text-blue-700">65K+ stars，MIT 许可</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl text-center" style="border:1px solid #e0f2fe; box-shadow:0 10px 40px -10px rgba(56,189,248,0.1)">
                        <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2">
                            <i class="ph ph-sliders-horizontal text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-blue-900 mb-1 text-sm">多模型玩家</h4>
                        <p class="text-xs text-blue-700">75+ providers，任意切换</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-emerald-50 p-4 rounded-xl text-center border border-emerald-200">
                    <div class="text-3xl font-bold text-emerald-600 mb-1">180K+</div>
                    <div class="text-xs text-emerald-700">GitHub Stars</div>
                </div>
                <div class="bg-emerald-50 p-4 rounded-xl text-center border border-emerald-200">
                    <div class="text-3xl font-bold text-emerald-600 mb-1">75+</div>
                    <div class="text-xs text-emerald-700">LLM Providers</div>
                </div>
                <div class="bg-emerald-50 p-4 rounded-xl text-center border border-emerald-200">
                    <div class="text-3xl font-bold text-emerald-600 mb-1">3</div>
                    <div class="text-xs text-emerald-700">部署形态 (TUI/桌面/IDE)</div>
                </div>
            </div>

            <div class="bg-slate-900 text-slate-100 p-6 rounded-xl mb-6">
                <h3 class="font-bold text-white mb-3 text-lg flex items-center gap-2"><i class="ph ph-rocket text-emerald-400"></i> 快速开始</h3>
                <div class="font-mono text-sm space-y-2">
                    <div><span class="text-slate-400"># 安装</span></div>
                    <div class="text-emerald-300">curl -fsSL https://opencode.ai/install | bash</div>
                    <div class="text-slate-400 mt-2"># 运行</div>
                    <div class="text-emerald-300">opencode</div>
                </div>
            </div>

            <div class="text-center">
                <div class="inline-block bg-gradient-to-r from-blue-500 to-emerald-500 text-white px-8 py-4 rounded-xl">
                    <p class="text-xl font-bold">从对话到执行 —— 用 OpenCode</p>
                </div>
                <p class="text-slate-500 text-sm mt-4">openencode.ai | GitHub: sst/opencode</p>
            </div>
        </div>
    </div>
</body>
</html>
