<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 08 页</title>
    
    <link rel="stylesheet" href="../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
<link rel="stylesheet" href="../libs/tailwind.css">
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-terminal text-blue-600"></i> !shell 命令执行
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-10"></div>

            <!-- 核心概念 -->
            <div class="bg-white p-6 rounded-xl card-gradient-border mb-6">
                <p class="text-lg text-slate-700 leading-relaxed mb-4">
                    通过 <code class="bg-slate-100 px-2 py-1 rounded text-purple-600">! 命令</code> 语法，OpenCode 可以在本地终端执行 shell 命令，并将输出回传给智能体。
                </p>
                <div class="flex items-center gap-2 text-sm text-slate-500">
                    <i class="ph ph-warning text-yellow-500"></i>
                    所有命令执行前都会显示预览，需要用户确认。
                </div>
            </div>

            <!-- 使用方式 -->
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-terminal-window text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">直接执行</h3>
                    </div>
                    <code class="text-sm text-slate-600 break-all">
                        !npm install package-name
                    </code>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-git-branch text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">Git 操作</h3>
                    </div>
                    <code class="text-sm text-slate-600 break-all">
                        !git status && !git diff
                    </code>
                </div>
            </div>

            <!-- 安全边界 -->
            <div class="bg-yellow-50 p-5 rounded-xl border border-yellow-200 mb-6">
                <h3 class="font-bold text-yellow-900 mb-3 flex items-center gap-2">
                    <i class="ph ph-shield-warning text-yellow-600"></i> 安全边界
                </h3>
                <ul class="space-y-2 text-sm text-yellow-800">
                    <li class="flex items-start gap-2">
                        <i class="ph ph-check text-yellow-500 mt-0.5"></i>
                        <span><strong>命令预览：</strong>destructive 命令需要明确确认</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <i class="ph ph-check text-yellow-500 mt-0.5"></i>
                        <span><strong>输出回传：</strong>命令执行结果自动返回给智能体</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <i class="ph ph-check text-yellow-500 mt-0.5"></i>
                        <span><strong>工作目录：</strong>在项目根目录执行，环境继承</span>
                    </li>
                </ul>
            </div>

            <!-- 示例场景 -->
            <div class="bg-white p-5 rounded-xl card-gradient-border">
                <h3 class="font-bold text-slate-800 mb-3">典型使用场景</h3>
                <div class="grid grid-cols-3 gap-4 text-sm text-slate-600">
                    <div class="flex items-start gap-2">
                        <i class="ph ph-package text-purple-400 mt-0.5"></i>
                        <span>! 安装依赖并运行</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <i class="ph ph-git-commit text-purple-400 mt-0.5"></i>
                        <span>!git 提交和推送</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <i class="ph ph-test-tube text-purple-400 mt-0.5"></i>
                        <span>! 运行测试检查</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
