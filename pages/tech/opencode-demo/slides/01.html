<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第01页</title>
    
    <link rel="stylesheet" href="../../../../libs/style.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide {
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 8rem;
            box-sizing: border-box;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
        }

        .content-area {
            overflow-y: auto;
            scrollbar-width: none;
        }
        .content-area::-webkit-scrollbar {
            display: none;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: transparent;
            border: none;
            outline: none;
            text-align: center;
            cursor: pointer;
        }

        .card-gradient-border {
            position: relative;
            background-color: #ffffff;
            border: 1px solid #f1f5f9 !important;
            box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important;
        }
        .card-gradient-border-blue {
            position: relative;
            background-color: #f0f9ff;
            border: 1px solid #e0f2fe !important;
            box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important;
        }
    </style>
<link rel="stylesheet" href="../../../../libs/tailwind.css">
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide items-center justify-center text-center">
            <div class="w-24 h-24 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-8 mx-auto shadow-sm">
                <i class="ph ph-terminal-window text-5xl"></i>
            </div>
            <h1 class="text-5xl md:text-6xl font-bold text-slate-800 tracking-tight leading-tight mb-6 flex flex-col gap-4">
                <span class="text-slate-900 font-black">OpenCode</span>
                <span class="text-blue-600">开源 AI 编程代理</span>
            </h1>
            <div class="w-32 h-1 bg-blue-500 mx-auto rounded-full mb-8"></div>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto">
                终端 / 桌面 / IDE 通用的开源 coding agent
            </p>
            <p class="text-lg text-slate-400 mt-6 font-medium tracking-widest">
                opencode.ai  ·  Anomaly + SST
            </p>
        </div>
    </div>
</body>
</html>
