<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 14 页</title>
    
    <link rel="stylesheet" href="../../../../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
<link rel="stylesheet" href="../../../../libs/tailwind.css">
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-check-circle text-blue-600"></i> 形态对比小结
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-10"></div>

            <div class="bg-white p-6 rounded-xl card-gradient-border mb-6">
                <p class="text-lg text-slate-700 leading-relaxed">
                    OpenCode 提供三种形态，满足不同场景需求，但<strong>核心体验一致，配置互通</strong>。
                </p>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-6">
                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="ph ph-terminal-window text-3xl"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 text-center mb-2">TUI 终端</h3>
                    <ul class="text-xs text-slate-600 space-y-1 text-center">
                        <li>远程开发首选</li>
                        <li>脚本自动化</li>
                        <li>资源占用最小</li>
                    </ul>
                </div>

                <div class="bg-blue-50 p-5 rounded-xl card-gradient-border-blue">
                    <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="ph ph-desktop text-3xl"></i>
                    </div>
                    <h3 class="font-bold text-blue-900 text-center mb-2">桌面应用</h3>
                    <ul class="text-xs text-blue-700 space-y-1 text-center">
                        <li><strong>日常开发首选</strong></li>
                        <li>三栏最佳布局</li>
                        <li>完整功能体验</li>
                    </ul>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="w-14 h-14 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <i class="ph ph-file-code text-3xl"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 text-center mb-2">IDE 插件</h3>
                    <ul class="text-xs text-slate-600 space-y-1 text-center">
                        <li>无切换成本</li>
                        <li>原生编辑器</li>
                        <li>快速快捷键</li>
                    </ul>
                </div>
            </div>

            <div class="bg-gradient-to-r from-blue-500 to-emerald-500 p-6 rounded-xl text-white mb-6">
                <p class="text-center font-bold text-lg">
                    <i class="ph ph-circles-three-plus mr-2"></i>
                    核心引擎统一，配置自动同步
                </p>
            </div>

            <div class="bg-white p-5 rounded-xl card-gradient-border">
                <h3 class="font-bold text-slate-800 mb-3">如何选择？</h3>
                <div class="grid grid-cols-3 gap-4 text-sm text-slate-600">
                    <div class="text-center">
                        <p class="font-medium text-slate-800 mb-1">远程服务器</p>
                        <p class="text-blue-600">→ TUI 终端</p>
                    </div>
                    <div class="text-center">
                        <p class="font-medium text-slate-800 mb-1">日常开发</p>
                        <p class="text-emerald-600">→ 桌面应用</p>
                    </div>
                    <div class="text-center">
                        <p class="font-medium text-slate-800 mb-1">IDE 深度集成</p>
                        <p class="text-purple-600">→ IDE 插件</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
