<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 26 页</title>
    
    <link rel="stylesheet" href="../../../../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
<link rel="stylesheet" href="../../../../libs/tailwind.css">
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-lightning text-blue-600"></i> oh-my-opencode 哲学
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-6"></div>

            <div class="bg-slate-900 text-slate-100 p-6 rounded-xl mb-5">
                <p class="text-lg leading-relaxed italic">
                    "Claude Code 是一座不错的监狱——但它仍然是监狱。"
                </p>
                <p class="text-sm text-slate-400 mt-2">— oh-my-openagent · 社区最知名的 OpenCode 插件（npm: <code class="text-emerald-300">oh-my-opencode</code>，65K+ stars）</p>
            </div>

            <div class="bg-white p-5 rounded-xl card-gradient-border mb-5">
                <p class="text-base text-slate-700 leading-relaxed">
                    它的哲学：<b class="text-slate-900">不要被单一供应商锁定</b>。模型每月更便宜、更聪明，没有任何一家能垄断。所以与其精挑细选一个赢家，不如把它们<b class="text-slate-900">编排起来一起用</b>——为开放市场而建，而非围墙花园。
                </p>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div class="bg-blue-50 p-5 rounded-xl card-gradient-border-blue text-center">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="ph ph-coins text-xl"></i>
                    </div>
                    <h3 class="font-bold text-blue-900 mb-1 text-sm">Tokenmaxxing</h3>
                    <p class="text-xs text-blue-700">让"贵模型"只做难推理，"便宜模型"干苦力</p>
                </div>
                <div class="bg-blue-50 p-5 rounded-xl card-gradient-border-blue text-center">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="ph ph-tree-structure text-xl"></i>
                    </div>
                    <h3 class="font-bold text-blue-900 mb-1 text-sm">智能体分工</h3>
                    <p class="text-xs text-blue-700">11 个专门代理，各有模型与权限</p>
                </div>
                <div class="bg-blue-50 p-5 rounded-xl card-gradient-border-blue text-center">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="ph ph-arrows-clockwise text-xl"></i>
                    </div>
                    <h3 class="font-bold text-blue-900 mb-1 text-sm">Fallback 链</h3>
                    <p class="text-xs text-blue-700">主模型挂了自动切下一档，任务不中断</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
