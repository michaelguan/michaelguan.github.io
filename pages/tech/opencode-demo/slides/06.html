<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 06 页</title>
    <script src="../libs/tailwind.js"></script>
    <link rel="stylesheet" href="../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-devices text-blue-600"></i> 三种形态：Terminal / Desktop / IDE
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-10"></div>

            <div class="grid grid-cols-3 gap-6 content-area">
                <!-- TUI 终端形态 -->
                <div class="bg-white p-6 rounded-2xl card-gradient-border border-t-4 border-t-blue-500">
                    <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-4 mx-auto">
                        <i class="ph ph-terminal-window text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 text-center mb-3">TUI 终端</h3>
                    <p class="text-sm text-slate-600 leading-relaxed mb-4">
                        命令行界面，键盘驱动，适合純终端工作环境。
                    </p>
                    <ul class="text-xs text-slate-500 space-y-1">
                        <li class="flex items-center gap-1"><i class="ph ph-check text-green-500"></i> 远程服务器友好</li>
                        <li class="flex items-center gap-1"><i class="ph ph-check text-green-500"></i> 脚本化集成</li>
                        <li class="flex items-center gap-1"><i class="ph ph-check text-green-500"></i> 最小资源占用</li>
                    </ul>
                </div>

                <!-- 桌面应用 -->
                <div class="bg-blue-50 p-6 rounded-2xl card-gradient-border-blue border-t-4 border-t-emerald-500">
                    <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-4 mx-auto">
                        <i class="ph ph-desktop text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-blue-900 text-center mb-3">桌面应用</h3>
                    <p class="text-sm text-blue-800 leading-relaxed mb-4">
                        独立 GUI 应用，多栏布局，最适合日常开发。
                    </p>
                    <ul class="text-xs text-blue-700 space-y-1">
                        <li class="flex items-center gap-1"><i class="ph ph-check text-emerald-500"></i> 三栏标准布局</li>
                        <li class="flex items-center gap-1"><i class="ph ph-check text-emerald-500"></i> 文件树 integration</li>
                        <li class="flex items-center gap-1"><i class="ph ph-check text-emerald-500"></i> 语法高亮支持</li>
                    </ul>
                </div>

                <!-- IDE 插件 -->
                <div class="bg-white p-6 rounded-2xl card-gradient-border border-t-4 border-t-purple-500">
                    <div class="w-16 h-16 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mb-4 mx-auto">
                        <i class="ph ph-file-code text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 text-center mb-3">IDE 插件</h3>
                    <p class="text-sm text-slate-600 leading-relaxed mb-4">
                        集成到 VS Code/JetBrains，无上下文切换。
                    </p>
                    <ul class="text-xs text-slate-500 space-y-1">
                        <li class="flex items-center gap-1"><i class="ph ph-check text-green-500"></i> 原生编辑器体验</li>
                        <li class="flex items-center gap-1"><i class="ph ph-check text-green-500"></i> 项目直接集成</li>
                        <li class="flex items-center gap-1"><i class="ph ph-check text-green-500"></i> 快速快捷键操作</li>
                    </ul>
                </div>
            </div>

            <!-- 统一内核 -->
            <div class="mt-8 bg-gradient-to-r from-slate-50 to-blue-50 p-6 rounded-xl card-gradient-border-slate">
                <div class="flex items-center justify-center gap-3">
                    <i class="ph ph-seal-check text-blue-500 text-2xl"></i>
                    <p class="text-slate-700 text-center font-medium">
                        三种形态共享同一核心引擎，配置互通，体验一致
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
