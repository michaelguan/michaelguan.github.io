<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 19 页</title>
    
    <link rel="stylesheet" href="../../../../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
<link rel="stylesheet" href="../../../../libs/tailwind.css">
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-lightning text-blue-600"></i> 进阶内核概览
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-10"></div>

            <div class="bg-white p-6 rounded-xl card-gradient-border mb-6">
                <p class="text-lg text-slate-700 leading-relaxed mb-4">
                    OpenCode 的核心能力不仅仅是对话，还包括 LSP、子代理、MCP 等高级特性，构成了完整的智能体开发平台。
                </p>
            </div>

            <div class="grid grid-cols-2 gap-6 content-area mb-6">
                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-file-code text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">LSP 语言服务器</h3>
                    </div>
                    <p class="text-sm text-slate-600">提供代码智能、跳转定义、重构支持等 IDE 级体验</p>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-users text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">Subagents 子代理</h3>
                    </div>
                    <p class="text-sm text-slate-600">复杂任务自动分解，并行执行，提高效率</p>
                </div>

                <div class="bg-blue-50 p-5 rounded-xl card-gradient-border-blue">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-plugs text-xl"></i>
                        </div>
                        <h3 class="font-bold text-blue-900">MCP 协议</h3>
                    </div>
                    <p class="text-sm text-blue-800">模型上下文协议，扩展外部工具和数据源</p>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-gear text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">Plugins 插件</h3>
                    </div>
                    <p class="text-sm text-slate-600">oh-my-opencode、superpowers 等插件扩展</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl card-gradient-border">
                <h3 class="font-bold text-slate-800 mb-3">下一页开始详解</h3>
                <div class="grid grid-cols-3 gap-3 text-sm text-slate-600">
                    <div class="flex items-center gap-2"><span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">20</span><span>LSP 详解</span></div>
                    <div class="flex items-center gap-2"><span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">21</span><span>内置工具</span></div>
                    <div class="flex items-center gap-2"><span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold">22</span><span>Subagents</span></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
