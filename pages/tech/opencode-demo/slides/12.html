<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode：开源 AI 编程代理 - 第 12 页</title>
    
    <link rel="stylesheet" href="../libs/style.css">
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; background-color: #f8fafc; overflow: hidden; }
        .slide-container { width: 100vw; height: 100vh; display: flex; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .slide { width: 100vw; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8rem; box-sizing: border-box; background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%); }
        select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background: transparent; border: none; outline: none; text-align: center; cursor: pointer; }
        .card-gradient-border { position: relative; background-color: #ffffff; border: 1px solid #f1f5f9 !important; box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.06), 0 4px 10px -2px rgba(15, 23, 42, 0.02) !important; }
        .card-gradient-border-blue { position: relative; background-color: #f0f9ff; border: 1px solid #e0f2fe !important; box-shadow: 0 10px 40px -10px rgba(56, 189, 248, 0.1), 0 4px 10px -2px rgba(56, 189, 248, 0.03) !important; }
    </style>
<link rel="stylesheet" href="../libs/tailwind.css">
</head>
<body>
    <div class="slide-container" id="slide-track">
        <div class="slide">
            <h2 class="text-3xl font-bold text-slate-800 mb-2 flex items-center gap-3">
                <i class="ph ph-share-network text-blue-600"></i> Share 分享链接
            </h2>
            <div class="w-16 h-1 bg-blue-500 rounded-full mb-10"></div>

            <div class="bg-white p-6 rounded-xl card-gradient-border mb-6">
                <p class="text-lg text-slate-700 leading-relaxed mb-4">
                    通过 <code class="bg-slate-100 px-2 py-1 rounded text-purple-600">/share</code> 命令，你可以生成当前会话的分享链接，与他人协作或存档记录。
                </p>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-link text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">生成链接</h3>
                    </div>
                    <code class="text-sm text-slate-600 break-all">
                        /share 生成公开链接
                    </code>
                    <p class="text-xs text-slate-500 mt-2">链接包含完整对话历史和代码变更</p>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl card-gradient-border-slate">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center">
                            <i class="ph ph-lock-key text-xl"></i>
                        </div>
                        <h3 class="font-bold text-slate-800">隐私控制</h3>
                    </div>
                    <code class="text-sm text-slate-600 break-all">
                        /share --private 私密链接
                    </code>
                    <p class="text-xs text-slate-500 mt-2">仅持有链接者可访问，可设置过期时间</p>
                </div>
            </div>

            <div class="bg-blue-50 p-5 rounded-xl card-gradient-border-blue mb-6">
                <h3 class="font-bold text-blue-900 mb-3 flex items-center gap-2">
                    <i class="ph ph-users-three text-blue-500"></i> 使用场景
                </h3>
                <div class="grid grid-cols-3 gap-4 text-sm text-blue-800">
                    <div class="flex items-start gap-2">
                        <i class="ph ph-code text-blue-400 mt-0.5"></i>
                        <span>团队代码审查</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <i class="ph ph-document text-blue-400 mt-0.5"></i>
                        <span>任务进度同步</span>
                    </div>
                    <div class="flex items-start gap-2">
                        <i class="ph ph-warning-circle text-blue-400 mt-0.5"></i>
                        <span >问题复现与求助</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl card-gradient-border">
                <h3 class="font-bold text-slate-800 mb-3">分享链接示例</h3>
                <div class="bg-slate-100 p-3 rounded-lg">
                    <code class="text-sm text-blue-600 break-all">
                        https://opencode.ai/share/abc123def456
                    </code>
                </div>
                <p class="text-xs text-slate-500 mt-2">点击链接即可查看完整的对话历史和代码变更</p>
            </div>
        </div>
    </div>
</body>
</html>
