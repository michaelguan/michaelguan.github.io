theme: jekyll-theme-cayman
title: Michael Guan's Blog
description: 代码 · 游戏 · 生活
author: Michael Guan
url: https://michaelguan.github.io
baseurl: ""

# Markdown 处理
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# 静态文件
exclude:
  - libs/
  - pages/
  - deploy.sh
  - run.bat
  - CLAUDE.md
  - README.md

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Feed
feed:
  path: feed.xml

# SEO
lang: zh-CN
timezone: Asia/Shanghai